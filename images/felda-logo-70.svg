<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 120" width="340" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D68A"/>
      <stop offset="30%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#F0D680"/>
      <stop offset="70%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D68A" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FFF6D5" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#FFF6D5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C3A"/>
      <stop offset="100%" stop-color="#E8751A"/>
    </linearGradient>
  </defs>

  <!-- LEFT: 70 TAHUN -->
  <g transform="translate(45, 60)">
    <!-- Decorative swirl top-left -->
    <path d="M -25 -38 C -30 -50, -20 -55, -10 -50 C -5 -48, -2 -42, -5 -38"
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Number 7 -->
    <path d="M 5 -45 L 5 -30 L 30 -30"
          fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 7 serif at top -->
    <path d="M -2 -47 C 2 -50, 8 -50, 10 -46"
          fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Swirl from 7 bottom -->
    <path d="M 5 -30 C 0 -25, -8 -22, -4 -18 C 0 -15, 6 -17, 8 -22"
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Number 0 -->
    <ellipse cx="55" cy="-37" rx="22" ry="20" fill="none" stroke="url(#goldGrad)" stroke-width="7"/>

    <!-- 0 inner highlight -->
    <ellipse cx="55" cy="-37" rx="22" ry="20" fill="none" stroke="url(#goldShine)" stroke-width="3"/>

    <!-- Decorative swirl from 0 bottom-right -->
    <path d="M 77 -30 C 85 -25, 88 -15, 82 -8 C 78 -3, 72 -2, 70 -6"
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Small star/dot accents -->
    <circle cx="12" cy="-5" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="80" cy="-2" r="1.5" fill="url(#goldGrad)"/>

    <!-- TAHUN text -->
    <text x="35" y="8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600"
          fill="url(#goldGrad)" text-anchor="middle" letter-spacing="3">TAHUN</text>
  </g>

  <!-- Vertical divider -->
  <line x1="145" y1="8" x2="145" y2="112" stroke="#1A2E4A" stroke-width="1.5" opacity="0.3"/>

  <!-- RIGHT: FELDA Logo -->
  <g transform="translate(230, 60)">
    <!-- Rounded square -->
    <rect x="-40" y="-50" width="80" height="80" rx="16" ry="16"
          fill="none" stroke="#1A2E4A" stroke-width="2.5"/>
    <rect x="-40" y="-50" width="80" height="80" rx="16" ry="16"
          fill="url(#orangeGrad)" opacity="0.04"/>

    <!-- Stylized 'f' -->
    <g>
      <path d="M -15 -5 C -28 -5, -33 -15, -30 -28 C -27 -38, -18 -44, -5 -44
               C 8 -44, 18 -38, 22 -28 C 26 -18, 20 -8, 10 -6
               C 2 -4, -4 -8, -6 -16 C -8 -24, -2 -30, 6 -32
               C 12 -34, 18 -28, 16 -22
               M -22 -18 L 14 -26"
            fill="none" stroke="url(#orangeGrad)" stroke-width="4.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- FELDA text -->
    <text x="0" y="42" font-family="'Inter','Segoe UI',Arial,sans-serif"
          font-size="16" font-weight="700" fill="#1A2E4A"
          text-anchor="middle" letter-spacing="1.5">FELDA</text>
  </g>
</svg>
