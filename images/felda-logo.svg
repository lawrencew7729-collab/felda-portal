<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 195" width="160" height="195">
  <defs>
    <linearGradient id="feldaOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C3A"/>
      <stop offset="100%" stop-color="#E8751A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#E8751A" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Rounded square border -->
  <rect x="3" y="3" width="154" height="154" rx="28" ry="28"
        fill="none" stroke="#1A2E4A" stroke-width="3.5"/>

  <!-- Subtle orange tint inside -->
  <rect x="3" y="3" width="154" height="154" rx="28" ry="28"
        fill="url(#feldaOrange)" opacity="0.035"/>

  <!-- Stylized 'f' - refined path matching the actual FELDA logo -->
  <g filter="url(#shadow)">
    <path d="
      M 50 118
      C 30 118, 20 100, 22 82
      C 24 64, 32 52, 48 44
      C 64 36, 82 34, 98 38
      C 114 42, 126 52, 128 68
      C 130 84, 120 98, 104 102
      C 90 106, 78 100, 74 88
      C 70 76, 78 64, 92 62
      C 104 60, 112 68, 110 78

      M 44 90
      L 112 76
    "
    fill="none"
    stroke="url(#feldaOrange)"
    stroke-width="7.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  </g>

  <!-- FELDA text -->
  <text x="80" y="183"
        font-family="'Inter', 'Segoe UI', Arial, Helvetica, sans-serif"
        font-size="30"
        font-weight="700"
        fill="#1A2E4A"
        text-anchor="middle"
        letter-spacing="2.5">FELDA</text>
</svg>
